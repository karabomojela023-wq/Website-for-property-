<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: navy;
            color: white;
        }
        header {
            background: turquoise;
            padding: 20px;
            text-align: center;
            color: navy;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: white;
            color: navy;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background: turquoise;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: navy;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>🏠 Property Listings</h1>
        <p>Find your dream home</p>
    </header>
    <div class="container">
        <div class="card">
            <h2>Modern Family House</h2>
            <p>3 beds • 2 baths • 1,500 sq ft</p>
            <button>View Details</button>
        </div>
        <div class="card">
            <h2>Downtown Condo</h2>
            <p>2 beds • 2 baths • 1,100 sq ft</p>
            <button>View Details</button>
        </div>
        <div class="card">
            <h2>Lakeside Villa</h2>
            <p>4 beds • 3 baths • 2,400 sq ft</p>
            <button>View Details</button>
        </div>
    </div>
</body>
</html>
